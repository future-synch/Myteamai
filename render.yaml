services:
  - type: web
    name: myteamai
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HUBSPOT_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://myteamai.onrender.com
