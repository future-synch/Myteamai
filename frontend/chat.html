<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Team AI — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .brand { font-weight: 700; font-size: 1.05rem; }
    header .logout { font-size: 0.8rem; cursor: pointer; color: #a5b4fc; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 1rem 0.75rem;
      overflow-y: auto;
    }
    .sidebar h3 { font-size: 0.75rem; text-transform: uppercase; color: #9ca3af; margin-bottom: 0.75rem; }
    .fn-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: none;
      background: none;
      font-size: 0.88rem;
      cursor: pointer;
      color: #374151;
      margin-bottom: 0.25rem;
      transition: background 0.15s;
    }
    .fn-btn:hover, .fn-btn.active { background: #ede9fe; color: #4f46e5; font-weight: 500; }
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { max-width: 75%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.92rem; line-height: 1.5; }
    .msg.bot { background: #fff; border: 1px solid #e5e7eb; align-self: flex-start; }
    .msg.user { background: #4f46e5; color: #fff; align-self: flex-end; }
    .msg.error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; align-self: flex-start; }
    .msg.success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; align-self: flex-start; }
    .capabilities { margin-top: 0.5rem; }
    .capabilities li { font-size: 0.82rem; margin-left: 1.25rem; margin-top: 0.2rem; }
    .contact-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.75rem;
      margin-top: 0.5rem;
      font-size: 0.85rem;
    }
    .contact-card strong { color: #1a1a2e; }
    .form-panel {
      background: #fff;
      border-top: 1px solid #e5e7eb;
      padding: 1rem 1.5rem;
    }
    .form-panel.hidden { display: none; }
    .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .form-group { flex: 1; min-width: 160px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: #374151; margin-bottom: 0.3rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.45rem 0.7rem; border: 1.5px solid #d1d5db;
      border-radius: 7px; font-size: 0.88rem; outline: none;
      font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #4f46e5; }
    .form-group input.error, .form-group select.error { border-color: #ef4444; }
    .field-error { font-size: 0.75rem; color: #ef4444; min-height: 1rem; }
    .checkbox-group { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .checkbox-group label { display: flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; font-weight: normal; }
    .checkbox-group input { width: auto; }
    .form-actions { display: flex; justify-content: flex-end; padding-top: 0.5rem; }
    .send-btn {
      padding: 0.5rem 1.5rem;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    .send-btn:hover { background: #4338ca; }
    .send-btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .free-input { display: flex; gap: 0.5rem; padding: 0.75rem 1.5rem; background: #fff; border-top: 1px solid #e5e7eb; }
    .free-input input { flex: 1; padding: 0.6rem 0.9rem; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 0.9rem; outline: none; }
    .free-input input:focus { border-color: #4f46e5; }
    .free-input button { padding: 0.6rem 1.2rem; background: #4f46e5; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <span class="brand">My Team AI</span>
    <span class="logout" onclick="logout()">Sign out</span>
  </header>

  <div class="main">
    <nav class="sidebar">
      <h3>Functions</h3>
      <button class="fn-btn" onclick="showForm('welcome')">Welcome Client</button>
      <button class="fn-btn" onclick="showForm('register')">Register Applicant</button>
      <button class="fn-btn" onclick="showForm('match')">Match Applicants</button>
      <button class="fn-btn" onclick="showForm('valuation')">Valuation Brief</button>
      <button class="fn-btn" onclick="showForm('outreach')">Draft Outreach</button>
      <button class="fn-btn" onclick="showForm('kyc')">KYC Status</button>
    </nav>

    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="msg bot">Hello! I'm your My Team AI assistant. Select a function from the left or type a request below.</div>
      </div>

      <!-- Welcome Client Form -->
      <div class="form-panel hidden" id="form-welcome">
        <div class="form-row">
          <div class="form-group">
            <label>Client Name *</label>
            <input type="text" id="w-client_name" placeholder="e.g. James Hyde" />
            <div class="field-error" id="err-w-client_name"></div>
          </div>
          <div class="form-group">
            <label>Source *</label>
            <select id="w-source">
              <option value="">Select…</option>
              <option>Rightmove</option><option>Zoopla</option>
              <option>Referral</option><option>Direct</option><option>Other</option>
            </select>
            <div class="field-error" id="err-w-source"></div>
          </div>
          <div class="form-group">
            <label>Agent Name *</label>
            <input type="text" id="w-agent_name" placeholder="Your name" />
            <div class="field-error" id="err-w-agent_name"></div>
          </div>
          <div class="form-group">
            <label>Budget (£)</label>
            <input type="number" id="w-budget_gbp" placeholder="Optional — e.g. 2000000" />
            <div class="field-error" id="err-w-budget_gbp"></div>
          </div>
          <div class="form-group">
            <label>Dispatch to HubSpot</label>
            <select id="w-dispatch">
              <option value="false">No — draft only</option>
              <option value="true">Yes — send to HubSpot</option>
            </select>
            <div class="field-error" id="err-w-dispatch"></div>
          </div>
        </div>
        <div class="form-actions">
          <button class="send-btn" onclick="submitWelcome()">Generate Welcome</button>
        </div>
      </div>

      <!-- Register Applicant Form -->
      <div class="form-panel hidden" id="form-register">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="r-full_name" placeholder="e.g. Tom Baker" />
            <div class="field-error" id="err-r-full_name"></div>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="r-email" placeholder="tom@example.com" />
            <div class="field-error" id="err-r-email"></div>
          </div>
          <div class="form-group">
            <label>Phone *</label>
            <input type="text" id="r-phone" placeholder="+44 7700 900123" />
            <div class="field-error" id="err-r-phone"></div>
          </div>
          <div class="form-group">
            <label>Budget (£) *</label>
            <input type="number" id="r-budget" placeholder="e.g. 2500000" />
            <div class="field-error" id="err-r-budget"></div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Bedrooms Min *</label>
            <input type="number" id="r-bedrooms_min" placeholder="e.g. 3" value="2" />
            <div class="field-error" id="err-r-bedrooms_min"></div>
          </div>
          <div class="form-group">
            <label>Bedrooms Max</label>
            <input type="number" id="r-bedrooms_max" placeholder="Optional" />
          </div>
          <div class="form-group">
            <label>Financing *</label>
            <select id="r-financing">
              <option value="">Select…</option>
              <option value="cash">Cash</option>
              <option value="mortgage_aip">Mortgage (AIP)</option>
              <option value="mortgage_no_aip">Mortgage (no AIP)</option>
              <option value="unknown">Unknown</option>
            </select>
            <div class="field-error" id="err-r-financing"></div>
          </div>
          <div class="form-group">
            <label>Preferred Channel *</label>
            <select id="r-preferred_channel">
              <option value="">Select…</option>
              <option value="email">Email</option>
              <option value="phone">Phone</option>
              <option value="whatsapp">WhatsApp</option>
            </select>
            <div class="field-error" id="err-r-preferred_channel"></div>
          </div>
          <div class="form-group">
            <label>Source *</label>
            <input type="text" id="r-source" placeholder="Rightmove, Referral, etc." />
            <div class="field-error" id="err-r-source"></div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex: 1;">
            <label>Property Types * (select one or more)</label>
            <div class="checkbox-group" id="r-property_types">
              <label><input type="checkbox" value="house"> House</label>
              <label><input type="checkbox" value="flat"> Flat</label>
              <label><input type="checkbox" value="maisonette"> Maisonette</label>
              <label><input type="checkbox" value="any"> Any</label>
            </div>
            <div class="field-error" id="err-r-property_types"></div>
          </div>
          <div class="form-group">
            <label>Timeline (weeks)</label>
            <input type="number" id="r-timeline_weeks" placeholder="Optional" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex: 1;">
            <label>Must-Have</label>
            <textarea id="r-must_have" placeholder="Optional — e.g. garden, parking, near tube"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="send-btn" onclick="submitRegister()">Register Applicant</button>
        </div>
      </div>

      <!-- Match Applicants Form -->
      <div class="form-panel hidden" id="form-match">
        <div class="form-row">
          <div class="form-group">
            <label>Property Reference *</label>
            <input type="text" id="m-property_ref" placeholder="e.g. 22 Abbotsbury Road" />
            <div class="field-error" id="err-m-property_ref"></div>
          </div>
          <div class="form-group">
            <label>Max Results (1–20)</label>
            <input type="number" id="m-max_results" value="5" min="1" max="20" />
            <div class="field-error" id="err-m-max_results"></div>
          </div>
        </div>
        <div class="form-actions">
          <button class="send-btn" onclick="submitMatch()">Find Matches</button>
        </div>
      </div>

      <!-- KYC Status Form -->
      <div class="form-panel hidden" id="form-kyc">
        <div class="form-row">
          <div class="form-group">
            <label>Name or Email *</label>
            <input type="text" id="k-name_or_id" placeholder="e.g. Tom Baker or tom@example.com" />
            <div class="field-error" id="err-k-name_or_id"></div>
          </div>
          <div class="form-group">
            <label>Type *</label>
            <select id="k-type">
              <option value="applicant">Applicant</option>
              <option value="client">Client</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button class="send-btn" onclick="submitKYC()">Check KYC Status</button>
        </div>
      </div>

      <!-- Free-text input -->
      <div class="free-input">
        <input type="text" id="freeText" placeholder="Or type your request here…" onkeydown="if(event.key==='Enter')sendFree()" />
        <button onclick="sendFree()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    function showForm(name) {
      document.querySelectorAll('.form-panel').forEach(p => p.classList.add('hidden'));
      const panel = document.getElementById('form-' + name);
      if (panel) panel.classList.remove('hidden');
    }

    function addMsg(text, type = 'bot') {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      div.innerHTML = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function fieldError(id, msg) {
      const el = document.getElementById(id);
      if (el) el.textContent = msg;
      const inp = document.getElementById(id.replace('err-', ''));
      if (inp) inp.classList.toggle('error', !!msg);
    }

    function clearErrors(prefix) {
      document.querySelectorAll(`[id^="err-${prefix}"]`).forEach(el => {
        el.textContent = '';
        const inp = document.getElementById(el.id.replace('err-', ''));
        if (inp) inp.classList.remove('error');
      });
    }

    async function postJSON(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({ detail: 'Invalid JSON response' }));
      return { ok: res.ok, status: res.status, data };
    }

    // ----- Welcome Client -----
    async function submitWelcome() {
      clearErrors('w-');
      let valid = true;
      const name   = document.getElementById('w-client_name').value.trim();
      const source = document.getElementById('w-source').value;
      const agent  = document.getElementById('w-agent_name').value.trim();
      const budget = document.getElementById('w-budget_gbp').value;
      const dispatch = document.getElementById('w-dispatch').value === 'true';

      if (!name) { fieldError('err-w-client_name', 'Client name is required'); valid = false; }
      else if (name.length < 2) { fieldError('err-w-client_name', 'Client name must be at least 2 characters'); valid = false; }
      if (!source) { fieldError('err-w-source', 'Source is required'); valid = false; }
      if (!agent) { fieldError('err-w-agent_name', 'Agent name is required'); valid = false; }
      if (budget && parseInt(budget) < 100000) { fieldError('err-w-budget_gbp', 'Budget must be at least £100,000'); valid = false; }
      if (!valid) return;

      const body = { client_name: name, source, agent_name: agent, dispatch };
      if (budget) body.budget_gbp = parseInt(budget);

      addMsg(`Generate welcome for <strong>${name}</strong> (${source})`, 'user');
      const btn = document.querySelector('#form-welcome .send-btn');
      btn.disabled = true;
      const { ok, data } = await postJSON('/bot/welcome', body);
      if (ok && data.message_draft) addMsg(data.message_draft.replace(/\n/g, '<br>'));
      else addMsg('Error: ' + (data.detail || data.status || 'Unknown'), 'error');
      btn.disabled = false;
    }

    // ----- Register Applicant -----
    async function submitRegister() {
      clearErrors('r-');
      let valid = true;
      const full_name = document.getElementById('r-full_name').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const phone = document.getElementById('r-phone').value.trim();
      const budget = parseInt(document.getElementById('r-budget').value);
      const bedrooms_min = parseInt(document.getElementById('r-bedrooms_min').value);
      const bedrooms_max_raw = document.getElementById('r-bedrooms_max').value;
      const financing = document.getElementById('r-financing').value;
      const preferred_channel = document.getElementById('r-preferred_channel').value;
      const source = document.getElementById('r-source').value.trim();
      const timeline_raw = document.getElementById('r-timeline_weeks').value;
      const must_have = document.getElementById('r-must_have').value.trim();
      const property_types = Array.from(
        document.querySelectorAll('#r-property_types input:checked')
      ).map(x => x.value);

      if (!full_name) { fieldError('err-r-full_name', 'Full name is required'); valid = false; }
      if (!email) { fieldError('err-r-email', 'Email is required'); valid = false; }
      else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { fieldError('err-r-email', 'Invalid email'); valid = false; }
      if (!phone) { fieldError('err-r-phone', 'Phone is required'); valid = false; }
      if (!budget) { fieldError('err-r-budget', 'Budget is required'); valid = false; }
      if (!bedrooms_min) { fieldError('err-r-bedrooms_min', 'Bedrooms min is required'); valid = false; }
      if (!financing) { fieldError('err-r-financing', 'Financing is required'); valid = false; }
      if (!preferred_channel) { fieldError('err-r-preferred_channel', 'Channel is required'); valid = false; }
      if (!source) { fieldError('err-r-source', 'Source is required'); valid = false; }
      if (property_types.length === 0) { fieldError('err-r-property_types', 'Pick at least one'); valid = false; }
      if (!valid) return;

      const body = {
        full_name, email, phone, budget, bedrooms_min,
        property_types, financing, preferred_channel, source,
      };
      if (bedrooms_max_raw) body.bedrooms_max = parseInt(bedrooms_max_raw);
      if (timeline_raw)     body.timeline_weeks = parseInt(timeline_raw);
      if (must_have)        body.must_have = must_have;

      addMsg(`Register applicant <strong>${full_name}</strong> (${email})`, 'user');
      const btn = document.querySelector('#form-register .send-btn');
      btn.disabled = true;
      const { ok, data } = await postJSON('/bot/register-applicant', body);
      if (ok && data.status === 'ok' && data.hubspot_contact_id) {
        addMsg(`✓ Contact created in HubSpot — ID <strong>${data.hubspot_contact_id}</strong>`, 'success');
      } else {
        addMsg('Failed to create contact: ' + (data.detail || data.status || 'Unknown'), 'error');
      }
      btn.disabled = false;
    }

    // ----- Match Applicants -----
    async function submitMatch() {
      clearErrors('m-');
      const ref = document.getElementById('m-property_ref').value.trim();
      const max = parseInt(document.getElementById('m-max_results').value) || 5;
      if (!ref) { fieldError('err-m-property_ref', 'Property reference is required'); return; }
      if (max > 20) { fieldError('err-m-max_results', 'Cannot exceed 20'); return; }

      addMsg(`Find applicants for <strong>${ref}</strong>`, 'user');
      const { ok, data } = await postJSON('/bot/match-applicants', { property_ref: ref, max_results: max });
      if (ok && data.status === 'ok') {
        if (data.count === 0) {
          addMsg('No applicants found in HubSpot yet. Register one first via the "Register Applicant" form.');
          return;
        }
        let html = `<strong>Found ${data.count} applicant${data.count === 1 ? '' : 's'}:</strong>`;
        (data.matches || []).forEach(m => {
          const p = m.properties || {};
          html += `
            <div class="contact-card">
              <strong>${p.firstname || ''} ${p.lastname || ''}</strong><br>
              ${p.email || '—'} · ${p.phone || '—'}<br>
              Budget: £${(p.applicant_budget_gbp || '—')} ·
              Beds: ${p.applicant_bedrooms_min || '—'}+ ·
              ${p.applicant_property_types || '—'}
            </div>`;
        });
        addMsg(html);
      } else {
        addMsg('Error: ' + (data.detail || data.status || 'Unknown'), 'error');
      }
    }

    // ----- KYC Status -----
    async function submitKYC() {
      clearErrors('k-');
      const name_or_id = document.getElementById('k-name_or_id').value.trim();
      const type = document.getElementById('k-type').value;
      if (!name_or_id) { fieldError('err-k-name_or_id', 'Name or email is required'); return; }

      addMsg(`Check KYC for <strong>${name_or_id}</strong>`, 'user');
      const { ok, data } = await postJSON('/bot/kyc-status', { name_or_id, type });
      if (ok && data.status === 'ok') {
        const complete = data.kyc_complete ? '✓ Complete' : '✗ Incomplete';
        const items = (data.outstanding_items || []).length
          ? `<br>Outstanding: ${data.outstanding_items.join(', ')}`
          : '';
        addMsg(`<strong>KYC: ${complete}</strong>${items}`, data.kyc_complete ? 'success' : 'error');
      } else if (data.status === 'not_found') {
        addMsg(`No contact found matching "${name_or_id}".`, 'error');
      } else {
        addMsg('Error: ' + (data.detail || data.status || 'Unknown'), 'error');
      }
    }

    // ----- Free-text classifier + auto-dispatch -----
    async function sendFree() {
      const inp = document.getElementById('freeText');
      const text = inp.value.trim();
      if (!text) return;
      inp.value = '';
      addMsg(text, 'user');
      const { ok, data } = await postJSON('/classify', { text });

      if (!ok || data.status !== 'ok') {
        // UNKNOWN_INTENT → show capabilities
        let html = `<strong>${data.message || "I can't help with that."}</strong><ul class="capabilities">`;
        (data.capabilities || []).forEach(c => { html += `<li>${c}</li>`; });
        html += '</ul>';
        addMsg(html, 'error');
        return;
      }

      // Known intent — auto-dispatch WELCOME_CLIENT, otherwise guide to the form
      if (data.intent === 'WELCOME_CLIENT') {
        addMsg('<em>Generating welcome draft…</em>');
        const result = await postJSON('/bot/welcome-from-text', { text });
        const d = result.data;
        if (result.ok && d.status === 'ok' && d.message_draft) {
          let html = '';
          if (d.extracted) {
            html += `<small><strong>Extracted:</strong> Client = ${d.extracted.client_name || '—'} · Source = ${d.extracted.source || '—'}`;
            if (d.extracted.budget_gbp) html += ` · Budget = £${Number(d.extracted.budget_gbp).toLocaleString()}`;
            if (d.extracted.timeline) html += ` · Timeline = ${d.extracted.timeline}`;
            html += '</small><br><br>';
          }
          html += d.message_draft.replace(/\n/g, '<br>');
          addMsg(html, 'success');
        } else {
          addMsg('Draft generation failed: ' + (d.message_draft || d.status || 'Unknown'), 'error');
        }
      } else {
        addMsg(`Classified as <strong>${data.intent}</strong>. Use the sidebar form to complete this request.`);
      }
    }

    // Blur validation for required fields
    ['w-client_name','w-agent_name','w-source','m-property_ref',
     'r-full_name','r-email','r-phone','r-budget','r-bedrooms_min',
     'r-financing','r-preferred_channel','r-source','k-name_or_id'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('blur', () => {
        if (!el.value.trim()) fieldError('err-' + id, 'Required');
      });
      el.addEventListener('input', () => {
        if (document.getElementById('err-' + id)?.textContent) fieldError('err-' + id, '');
      });
    });
  </script>
</body>
</html>
